components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Ipv4Host:
      type: object
      required:
        - ip
      properties:
        ip:
          type: string
    Ipv4HostAndMask:
      type: object
      required:
        - ip
        - mask
      properties:
        ip:
          type: string
        mask:
          type: string
    Ipv4HostPort:
      type: object
      required:
        - ip
        - port
      properties:
        ip:
          type: string
        port:
          type: integer
          format: int32
    HomeboxError:
      type: object
      properties:
        code:
          type: integer
          format: int32
        subCode:
          type: integer
          format: int32
        service:
          type: string
        message:
          type: string
        trace:
          type: string
    HomeboxResponse:
      type: object
      required:
        - requestId
      properties:
        data:
          type: object
        error:
          $ref: '#/components/schemas/HomeboxError'
        request_id:
          type: string
    HomeboxResponses:
      type: object
      required:
        - requestId
      properties:
        data:
          type: array
          items:
            type: object
        error:
          $ref: '#/components/schemas/HomeboxError'
        request_id:
          type: string
    HomeboxId:
      type: integer
      format: int32
    HomeboxObject:
      type: object
    HomeboxUser:
      type: object
      required:
        - email
      properties:
        id:
          $ref: '#/components/schemas/HomeboxId'
        first_name:
          type: string
        last_name:
          type: string
        email:
          type: string
        password:
          type: string
        realmType:
          $ref: '#/components/schemas/CredentialRealmType'
        last_updated_at:
          type: string
          format: date-time
        last_updated_by:
          $ref: '#/components/schemas/HomeboxId'
        deleted_at:
          type: string
          format: date-time
        deleted_by:
          $ref: '#/components/schemas/HomeboxId'
    HomeboxAppIntegrationType:
      type: string
      enum:
        # Injected credentials/schema; isolated DB / app instance
        - POSTGRES
        # Injected credentials/schema; isolated DB / app instance
        - MYSQL
        # Injected credentials; proxy isolated databases
        - REDIS
        # Injected credentials; proxy isolated databases
        - MEMCACHED
    # TODO may transform into encoded or type: object?
    HomeboxAppSysctlType:
      type: string
      enum:
        - LINUX_SRC_VALID_MARK
    HomeboxAppSystemSpec:
      type: object
      properties:
        sysctl:
          type: array
          items:
            $ref: '#/components/schemas/HomeboxAppSysctlType'
    HomeboxAppHardwareSpec:
      type: object
      properties:
        arch:
          type: string
          enum:
            - AARCH64
            - AMD64
        machine:
          type: string
          enum:
            - RPI5
        os:
          type: string
          enum:
            - LINUX
            - WINDOWS
        os_variant:
          type: string
    HomeboxAppNetworkProtocolType:
      type: string
      enum:
        - HTTP
        - HTTPS
        - REDIS
        - MEMCACHED
        - POSTGRES
        - MYSQL
        - GENERIC_TCP
        - GENERIC_UDP
    HomeboxAppNetworkPort:
      type: object
      properties:
        port_number:
          type: integer
          format: int32
        protocol:
          $ref: '#/components/schemas/HomeboxAppNetworkProtocolType'
        supported_network_types:
          type: array
          items:
            $ref: '#/components/schemas/HomeboxAppNetworkType'
        hostname_suggestions:
          type: array
          items:
            type: string
    HomeboxAppNetworkSpec:
      type: object
      properties:
        ports:
          type: array
          items:
            $ref: '#/components/schemas/HomeboxAppNetworkPort'
    HomeboxAppStorageSize:
      type: string
      description: |-
        Just a general gut check assumption on how large this directory can get to based on typical user behaviour. This
        is really just a guideline, so there is no imperative to be accurate at this point.
      enum:
        - KBS
        - MBS
        - GBS
        - TBS
    HomeboxAppStorageSpec:
      type: object
      required:
        - mandatory
        - user_override
        - symbolic_name
        - multi
        - size_approximation
        - system_auto
        - read_only
      description: |-
        WIP interpretation of a generic storage volume declaration from the application. This is still a little rough,
        and will likely need to evolve before its viable to build storage persistent volumes and valid external system
        locations.
      properties:
        mandatory:
          type: boolean
          description: |-
            Is this storage spec mandatory for the image to be deployed. It is typical to be true, but it can be set to
            optional (false) if the volume is aspirational, or doesn't impede critical functionality if absent. Be
            careful to avoid writing data to non-bound file-system locations, as this can significantly impact the
            performance and long term stability of the program.
        user_override:
          type: boolean
          description: |-
            Can the user override the system selected location suggested in this spec. System / cache / config
            directories should false unless the directory reference is being attached to original user content
        symbolic_name:
          type: string
          description: |-
            The name of the volume mount within the scope of the app (eg. cachedir, datadir, pictures, downloads)
        multi:
          type: boolean
          description: |-
            This storage spec can be applied to multiple volumes when user_override=true. This allows for such use cases
            as having a customizable number of attached storage
        size_approximation:
          $ref: '#/components/schemas/HomeboxAppStorageSize'
        system_auto:
          type: boolean
          description: Will the system
        mapper:
          type: string
          description: |-
            Mapping function between the location of the persistent volume and the local file-system location within the
            container. The volume mount for most problems will be absolute, since the programs will only function with
            specific files and directories serving specific purposes
        global_file_system_hints:
          type: array
          items:
            type: string
          description: |-
            Gives a suggested location in the Homebox global file-system scheme where it should be installed. This can
            be overwritten or completely ignored if inappropriate.
        volume_binder:
          type: boolean
          description: |-
            Create as a volume binding
        read_only:
          type: boolean
          description: |-
            The mount should be added as strictly read-only disabling all mutation
        binder_hints:
          type: array
          items:
            type: string
          description: |-
            Hints on how to approach volume binding
    HomeboxFunctionScriptType:
      type: string
      enum:
        - UNKNOWN
        - BASH
        - JAVASCRIPT
    HomeboxFunctionType:
      type: string
      enum:
        # Free-form object MAP with bound string properties (String,*)
        - OBJECT
        # Free-form MAP(*,*)
        - MAP
        # List of strings
        - LIST_STR
        # List of any data
        - LIST
        # String
        - STRING
        # 32-bit signed integer
        - INT32
        # 64-bit signed integer
        - INT64
        # 32-bit IEEE floating point number
        - FLOAT32
        # 64-bit IEEE floating point number
        - FLOAT64
        # boolean type
        - BOOLEAN
    HomeboxFunctionParam:
      type: object
      properties:
        name:
          type: string
        type:
          $ref: '#/components/schemas/HomeboxFunctionType'
        mandatory:
          type: boolean
        user_override:
          type: boolean
        masked:
          type: boolean
        binding_hints:
          type: array
          items:
            type: string
    HomeboxFunction:
      type: object
      properties:
        repository_id:
          $ref: '#/components/schemas/HomeboxId'
        release:
          type: string
        name:
          type: string
        version:
          type: string
        alt:
          type: string
        params:
          type: array
          items:
            $ref: '#/components/schemas/HomeboxFunctionParam'
        image:
          type: string
        label:
          type: string
        script_type:
          $ref: '#/components/schemas/HomeboxFunctionScriptType'
        script:
          type: string
    HomeboxAppRelIntegration:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/HomeboxId'
        app_rel_id:
          $ref: '#/components/schemas/HomeboxId'
        function_id:
          $ref: '#/components/schemas/HomeboxId'
        mandatory:
          type: boolean
        user_override:
          type: boolean
        # KV map <String, *>
        args:
          type: object
    HomeboxAppRel:
      description: A reference to a declared App
      type: object
      properties:
        id:
          $ref: '#/components/schemas/HomeboxId'
        repository_id:
          $ref: '#/components/schemas/HomeboxId'
        release:
          type: string
        name:
          type: string
        version:
          type: string
        alt:
          type: string
    HomeboxAppRelInstance:
      description: Join an app dependency declaration to its instance in the Homebox
      type: object
      properties:
        app_rel_id:
          $ref: '#/components/schemas/HomeboxId'
        app_instance_id:
          $ref: '#/components/schemas/HomeboxId'
    HomeboxAppSecuritySpec:
      type: object
      required:
        - security_category
      properties:
        security_category:
          $ref: '#/components/schemas/HomeboxAppSecurityCategory'
        signatures:
          type: array
          items:
            type: string
        repository_signature:
          type: string
    HomeboxAppSecurityCategory:
      type: string
      enum:
        # User App, no permissions; No shared files; No Network access
        - APP_PURE
        # User App, shared files with blue; shared network with blue
        - APP_SHARED_DISK
        # Monitoring App, system green-light monitoring exceptions only
        - APP_MONITORING_RESTRICTED
        # User App, shared files with red; full local network access
        - APP_SHARED_DISK_NETWORK_LIMITED
        # System App, API from all? -- Can attach to any app disk; can access unlimited network resources, restricted kubernetes API
        - SYS_PURPLE
        # System App, unlimited system / network access, access kubernetes API
        - SYS_BLACK
    HomeboxAppSpec:
      type: object
      required:
        - name
        - label
        - security_category
      properties:
        id:
          $ref: '#/components/schemas/HomeboxId'
        app_id:
          $ref: '#/components/schemas/HomeboxId'
        name:
          type: string
        label:
          type: string
        repository_id:
          $ref: '#/components/schemas/HomeboxId'
        repository_labels:
          type: array
          items:
            type: string
        repository_sideload:
          type: boolean
        release:
          type: string
        security_category:
          $ref: '#/components/schemas/HomeboxAppSecurityCategory'
        security:
          $ref: '#/components/schemas/HomeboxAppSecuritySpec'
        security_bypass:
          type: boolean
        networks:
          type: array
          items:
            $ref: '#/components/schemas/HomeboxAppNetworkSpec'
        storage_locations:
          type: array
          items:
            $ref: '#/components/schemas/HomeboxAppStorageSpec'
        hardware_requirements:
          type: array
          items:
            $ref: '#/components/schemas/HomeboxAppHardwareSpec'
        system_requirements:
          type: array
          items:
            $ref: '#/components/schemas/HomeboxAppSysctlType'
        dependencies:
          type: array
          items:
            $ref: '#/components/schemas/HomeboxAppRel'
    HomeboxAppRepository:
