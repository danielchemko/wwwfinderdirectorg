    # A root file system's root. At the beginning, we're only exposing file-systems to containers, not block devices, so
    # each much provide file-system based provisioning. This may be extended in the future to support block devices, but
    # this may go over most use cases home/SOHO's likely need. This list will grow and is NOT expected to retain ordinal
    # ordering as we add new supported storage locations.
    HomeboxStorageLocationType:
      type: string
      enum:
        # Local File Systems
        - DIRECT
        # Network File Systems
        - NFS
        - CIFS
        - ISCSI
        # Cluster File Systems
        - CEPH
        - HDFS
        # VENDOR
        - SYNOLOGY
        - QNAP
    # TODO Lots to add / unpack here around what applications can be attached to which storage roots in order to paint
    #  security policies properly
    HomeboxStorageRoot:
      type: object
      properties:
        id:
          $ref: '#/components/schemas/HomeboxId'
        name:
          type: string
        description:
          type: string
        credential_id:
          $ref: '#/components/schemas/HomeboxId'
        type:
          $ref: '#/components/schemas/HomeboxStorageLocationType'
        locator:
          type: string
        protected:
          type: boolean
        storage_capacity_bytes:
          type: integer
          format: int64
        storage_used_bytes:
          type: integer
          format: int64
        last_updated_at:
          type: string
          format: date-time
        last_updated_by:
          $ref: '#/components/schemas/HomeboxId'
        deleted_at:
          type: string
          format: date-time
        deleted_by:
          $ref: '#/components/schemas/HomeboxId'
