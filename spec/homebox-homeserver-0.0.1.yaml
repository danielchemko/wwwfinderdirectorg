openapi: 3.0.3

info:
  version: 1.0.0
  title: Homebox Home Server API
  contact:
    name: Daniel Chemko
    url: https://www.finderdirect.org
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  description: |-
    This API allows communication between end user tools and Homeserver instances. The server is the Homeserver. This 
    conduit enacts all command actions performed against the homeserver instance.
tags:
  - name: network
    description: "Perform host network administration / monitoring"
  - name: disk
    description: "Make IO available from the container to / from host OS directories"
  - name: useragent
    description: "Bridge requests to/from a User Agent"
servers:
  - url: https://localhost/
    variables:
      tenant:
        default: www
        description: Your tenant id
  - url: https://example.com/
paths:
  ###############################
  ## USER API
  ###############################
  "/api/v1/user":
    get:
      tags:
        - user
      description: Fetch a list of Homeserver users
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomeboxResponse'
    post:
      tags:
        - user
      description: Create a new Homeserver user record
      security:
        - bearerAuth: [ ]
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HomeboxUser'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomeboxResponse'
  "/api/v1/user/{id}":
    parameters:
      - in: path
        name: id
        schema:
          type: integer
          format: int32
        required: true
        description: The User ID as a subject
    get:
      tags:
        - user
      description: Fetch a single Homeserver user record
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HomeboxResponse'
    patch:
      tags:
        - user
      description: Update a Homeserver user record
      security:
        - bearerAuth: [ ]
      requestBody:
        content:
          application/json:
            schema:
