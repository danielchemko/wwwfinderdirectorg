          type: string
          format: date-time
        deleted_by:
          $ref: '#/components/schemas/HomeboxId'
    HomeboxNetworkProxyForwardStrategy:
      type: string
      enum:
        # Send the TCP request as-is (no adjustments) losing the original request IP (http/https supported)
        - TCP_FORWARD
        # Receive the request as HTTP and forward it to the destination HTTP (http only)
        - HTTP_FORWARD
        # Receive the request as HTTPs and forward it to the destination HTTPs (https only)
        - TLS_FORWARD
        # Generate a TLS endpoint and forward HTTP using X-forwarded-for (HTTP/https supported)
        - TLS_TERMINATE
    HomeboxNetworkProxyListenerResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/HomeboxNetworkProxyListener'
        error:
          $ref: '#/components/schemas/HomeboxError'
