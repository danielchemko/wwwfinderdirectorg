    HomeboxJobTarget:
      type: string
      # TODO maybe we tie a bunch of this into tasks instead and just make jobs the running value of tasks, in which case we don't need to separate spec from instance.. in which case we also don't need to
      enum:
        # call a task
        - APP_TASK
        # call a function assigned to an app
        - APP_FUNCTION
        # call a function assigned to an app instance
        - APP_INSTANCE_FUNCTION
        # install an app instance
        - APP_INSTALL
        # remove an app instance
        - APP_UNINSTALL
        # call a system task
        - SYS_TASK
        # call a function assigned to a system app or instance
        - SYS_FUNCTION
        # pre-calculated facts collection evolution
        - SYS_SOLVER
        # core system app installation
        - SYS_INSTALL
        # core system app upgrade
        - SYS_UPGRADE
        # core system app removal
        - SYS_UNINSTALL
